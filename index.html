<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog dos Amigos</title>
</head>
<body>

    <h1>Blog dos Amigos</h1>

    <input id="chave" type="password" placeholder="Chave secreta">
    <br><br>

    <input id="titulo" placeholder="Título do post">
    <br><br>

    <textarea id="conteudo" placeholder="Escreva algo..." rows="5" cols="40"></textarea>
    <br><br>

    <button onclick="publicar()">Publicar</button>

    <hr>

    <div id="posts"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

        import {
            getFirestore,
            collection,
            addDoc,
            getDocs,
            query,
            orderBy
        } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "huntrixx-project.firebaseapp.com",
            projectId: "huntrixx-project",
            storageBucket: "huntrixx-project.firebasestorage.app",
            messagingSenderId: "207651890154",
            appId: "1:207651890154:web:2619523aff9ae6175f8893"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const CHAVE = "HUNTRIXX2026";

        window.publicar = async function () {
            const chave = document.getElementById("chave").value;

            if (chave !== CHAVE) {
                alert("Chave incorreta!");
                return;
            }

            const titulo = document.getElementById("titulo").value.trim();
            const conteudo = document.getElementById("conteudo").value.trim();

            if (!titulo || !conteudo) {
                alert("Preencha todos os campos.");
                return;
            }

            await addDoc(collection(db, "posts"), {
                titulo,
                conteudo,
                data: new Date().toISOString()
            });

            alert("Post publicado!");

            location.reload();
        };

        async function carregarPosts() {
            const q = query(
                collection(db, "posts"),
                orderBy("data", "desc")
            );

            const snapshot = await getDocs(q);

            const div = document.getElementById("posts");

            div.innerHTML = "";

            snapshot.forEach(doc => {
                const post = doc.data();

                const dataFormatada = post.data
                    ? new Date(post.data).toLocaleString("pt-BR")
                    : "Data desconhecida";

                div.innerHTML += `
                    <h2>${post.titulo}</h2>
                    <p>${post.conteudo}</p>
                    <small>${dataFormatada}</small>
                    <hr>
                `;
            });
        }

        carregarPosts();
    </script>

</body>
</html>
